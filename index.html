<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven Logistics UK | Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .accent-border {
            border-left: 4px solid #3b82f6;
        }
        .btn-primary {
            background-color: #3b82f6;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background-color: #334155;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover {
            background-color: #475569;
        }
        input::placeholder {
            color: #94a3b8;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

<div id="app" class="w-full max-w-xl space-y-8">
    <div class="text-center space-y-3">
        <h1 class="text-3xl font-light tracking-tight text-white uppercase">
            Raven <span class="font-semibold text-blue-500">Logistics</span> UK
        </h1>
        <div class="h-px w-12 bg-blue-500 mx-auto"></div>
        <p class="text-sm text-slate-400 uppercase tracking-widest">Personnel Registry & Blacklist</p>
    </div>

    <div class="glass-panel rounded-xl p-8 shadow-2xl space-y-6">
        <form id="search-form" class="space-y-4">
            <div class="relative">
                <input type="text" id="search-input" placeholder="Discord Username or User ID..." required
                       class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
            </div>
            
            <button type="submit" class="w-full p-4 rounded-lg font-semibold text-white btn-primary uppercase tracking-wider text-sm">
                Search Database
            </button>

            <div class="flex gap-3">
                <a href="https://github.com/Raven-Logistics-UK/blacklist" target="_blank"
                   class="flex-1 text-center p-3 rounded-lg text-xs font-semibold text-slate-300 btn-secondary uppercase">
                    Repository
                </a>
                <button type="button" id="download-button"
                        class="flex-1 text-center p-3 rounded-lg text-xs font-semibold text-slate-300 btn-secondary uppercase">
                    Export JSON
                </button>
            </div>
        </form>

        <div id="status-message" class="text-center hidden animate-pulse">
            <p id="message-text" class="text-xs text-blue-400 uppercase tracking-tighter"></p>
        </div>

        <div id="result-container" class="hidden space-y-6 pt-4 border-t border-slate-700">
            <div class="flex items-center justify-between">
                <h2 id="result-title" class="text-lg font-semibold uppercase tracking-wide"></h2>
                <span id="badge" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase"></span>
            </div>

            <div id="result-details" class="space-y-4 bg-slate-900/40 p-5 rounded-lg accent-border">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold block mb-1">Identity</label>
                    <p id="discord-info" class="text-slate-200 font-medium"></p>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold block mb-1">Incident Reason</label>
                    <p id="reason-info" class="text-slate-300 text-sm italic"></p>
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold block mb-1">Authorizing Official</label>
                    <p id="moderator-info" class="text-slate-300 text-sm"></p>
                </div>
            </div>

            <button id="copy-discord" class="w-full btn-secondary text-slate-200 text-xs p-3 rounded-lg font-bold uppercase tracking-widest">
                Copy Discord ID
            </button>
        </div>
    </div>

    <p class="text-center text-[10px] text-slate-500 uppercase tracking-[0.2em]">
        Proprietary Information &copy; <span id="copyright-year"></span> Raven Logistics UK
    </p>

    <div id="alert-modal" class="fixed inset-0 bg-slate-950/90 flex items-center justify-center hidden z-50">
        <div class="glass-panel border-slate-700 rounded-lg p-8 max-w-sm w-full mx-4 text-center space-y-4">
            <h3 id="alert-title" class="text-blue-500 font-bold uppercase tracking-widest"></h3>
            <p id="alert-body" class="text-slate-400 text-sm"></p>
            <button id="alert-close" class="w-full btn-primary p-3 rounded text-xs font-bold uppercase">Acknowledge</button>
        </div>
    </div>
</div>

<script>
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/Raven-Logistics-UK/blacklist/refs/heads/main/blacklist.json';

    const searchForm = document.getElementById('search-form');
    const searchInput = document.getElementById('search-input');
    const statusMessage = document.getElementById('status-message');
    const messageText = document.getElementById('message-text');
    const resultContainer = document.getElementById('result-container');
    const resultTitle = document.getElementById('result-title');
    const badge = document.getElementById('badge');
    const discordInfo = document.getElementById('discord-info');
    const reasonInfo = document.getElementById('reason-info');
    const moderatorInfo = document.getElementById('moderator-info');
    const copyDiscordButton = document.getElementById('copy-discord');
    const downloadButton = document.getElementById('download-button');
    const alertModal = document.getElementById('alert-modal');
    const alertTitle = document.getElementById('alert-title');
    const alertBody = document.getElementById('alert-body');
    const alertCloseButton = document.getElementById('alert-close');
    const copyrightYear = document.getElementById('copyright-year');

    let blacklistData = [];

    async function fetchBlacklist() {
        try {
            showStatus('Synchronizing database...', true);
            const response = await fetch(GITHUB_RAW_URL);
            if (!response.ok) throw new Error(`Status: ${response.status}`);
            blacklistData = await response.json();
            showStatus('', false);
            return true;
        } catch (error) {
            showStatus('Connection Error: Failed to reach registry.', false);
            return false;
        }
    }

    function showStatus(message, visible) {
        if (!visible) {
            statusMessage.classList.add('hidden');
            return;
        }
        statusMessage.classList.remove('hidden');
        messageText.textContent = message;
        resultContainer.classList.add('hidden');
    }

    function showAlert(title, message) {
        alertTitle.textContent = title;
        alertBody.textContent = message;
        alertModal.classList.remove('hidden');
    }

    function hideAlert() {
        alertModal.classList.add('hidden');
    }

    function searchBlacklist(query) {
        const normalizedQuery = query.trim().toLowerCase();
        return blacklistData.find(entry => {
            return (
                (entry.discord_id && entry.discord_id.toString().toLowerCase() === normalizedQuery) ||
                (entry.discord_username && entry.discord_username.toLowerCase() === normalizedQuery)
            );
        });
    }

    function displayResult(result) {
        resultContainer.classList.remove('hidden');
        statusMessage.classList.add('hidden');

        if (result) {
            resultTitle.textContent = 'Blacklist Match';
            resultTitle.className = 'text-lg font-semibold uppercase tracking-wide text-red-400';
            badge.textContent = 'Restricted';
            badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-red-500/20 text-red-500 border border-red-500/30';
            discordInfo.textContent = `${result.discord_username || 'Unknown'} (ID: ${result.discord_id || 'N/A'})`;
            reasonInfo.textContent = result.reason || 'No specific reason provided.';
            moderatorInfo.textContent = result.moderator || 'Registry Automator';
            copyDiscordButton.classList.toggle('hidden', !result.discord_id);
            if (result.discord_id) {
                copyDiscordButton.onclick = () => copyToClipboard(result.discord_id, 'Identification string copied.');
            }
        } else {
            resultTitle.textContent = 'Clear Record';
            resultTitle.className = 'text-lg font-semibold uppercase tracking-wide text-emerald-400';
            badge.textContent = 'Authorized';
            badge.className = 'px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-emerald-500/20 text-emerald-500 border border-emerald-500/30';
            discordInfo.textContent = 'User not found in restricted database.';
            reasonInfo.textContent = '---';
            moderatorInfo.textContent = '---';
            copyDiscordButton.classList.add('hidden');
        }
    }

    function copyToClipboard(text, successMessage) {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showAlert('Clipboard', successMessage);
    }

    function downloadJson() {
        if (blacklistData.length === 0) {
            showAlert('Wait', 'Registry not loaded.');
            return;
        }
        const dataStr = JSON.stringify(blacklistData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'raven_registry_export.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    searchForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = searchInput.value;
        if (!query) return;
        if (blacklistData.length === 0) {
            const fetched = await fetchBlacklist();
            if (!fetched) return;
        }
        displayResult(searchBlacklist(query));
    });

    downloadButton.addEventListener('click', downloadJson);
    alertCloseButton.addEventListener('click', hideAlert);

    window.onload = () => {
        copyrightYear.textContent = new Date().getFullYear();
        fetchBlacklist();
    };
</script>
</body>
</html>
